# 完整 GitHub Actions workflow 示例
# 用法：复制到你的项目 .github/workflows/mp-ci.yml
# 需要的 GitHub Secrets: WX_APPID, WX_PRIVATE_KEY, WX_APP_SECRET（可选，见注释）

name: MP CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'apps/mp/**'
      - '.github/workflows/mp-ci.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

# 只有启用 experience QR step 才需要
# permissions:
#   issues: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install MP deps
        working-directory: apps/mp
        run: npm install --no-audit --no-fund

      # ====== 路径 1: miniprogram-ci preview（不需要 AppSecret）======
      # build + upload + dev preview QR（30 分钟有效，未发布也能用）
      - name: Build + upload + dev preview QR
        if: always()
        working-directory: apps/mp
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p .keys
          printf '%s' "$WX_PRIVATE_KEY" > .keys/wx.pem
          chmod 600 .keys/wx.pem
          ./node_modules/.bin/miniprogram-ci preview \
            --appid "$WX_APPID" \
            --pkp ./.keys/wx.pem \
            --pp ./ \
            --uv 1 --rv 1 \
            --enable-es6 true --enable-es7 true \
            --enable-minifyWXSS true --enable-minifyWXML true --enable-minifyJS true \
            --enable-qrcode \
            --qrcode-format image \
            --qrcode-output-dest ./qrcode.png
          file qrcode.png
          rm -f .keys/wx.pem

      - name: Upload dev preview QR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mp-qrcode
          path: apps/mp/qrcode.png
          if-no-files-found: warn

      # ====== 渲染 ASCII QR 到 log（不用下载图片，直接打开 log 扫码）======
      # 用 Unicode block 字符（▀▄█）把 PNG 转成 monospace 文本 QR
      # GitHub Actions log 用 monospace 字体渲染，扫码可用
      - name: Render QR to log (Unicode block)
        if: always()
        working-directory: apps/mp
        run: |
          if [ ! -f qrcode.png ]; then
            echo "(qrcode.png not found, skip)"
            exit 0
          fi
          python3 -m pip install --quiet --break-system-packages Pillow 2>&1 | tail -2
          python3 << 'EOF'
          from PIL import Image
          img = Image.open('qrcode.png').convert('1')
          target = 60  # log 里显示宽度（字符数）
          w, h = img.size
          scale = max(1, max(w, h) // target)
          img = img.resize((max(1, w // scale), max(1, h // scale)))
          w, h = img.size
          print(f"\n>>> dev preview QR (PNG: {w*scale}x{h*scale}, log 中扫码用) <<<\n")
          for y in range(0, h, 2):
              line = ''
              for x in range(w):
                  top = img.getpixel((x, y))
                  bottom = img.getpixel((x, y+1)) if y+1 < h else 0
                  if top and bottom: line += '██'
                  elif top: line += '▀▀'
                  elif bottom: line += '▄▄'
                  else: line += '  '
              print(line)
          print(f"\n>>> 扫码后进 dev preview，30 分钟内有效 <<<\n")
          EOF

